server:
  port: 8080

spring:
  application:
    name: lead

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://127.0.0.1:3306/crm_lead?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD:}

  redis:
    host: ${REDIS_HOST:127.0.0.1}
    port: ${REDIS_PORT:6379}

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.crm.lead.entity
  configuration:
    map-underscore-to-camel-case: true

logging:
  level:
    com.crm.lead.mapper: debug
